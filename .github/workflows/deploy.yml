name: Deploy (optional)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (root)
        run: npm install

      - name: Build backend
        run: npm run build || echo "No build script"

      - name: Install deps (frontend)
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy frontend to Vercel (manual)
        run: |
          echo "To enable automatic deployment to Vercel, set the VERCEL_TOKEN secret and replace this step with a Vercel action or CLI deploy."

      - name: Deploy backend placeholder (manual)
        run: |
          echo "To enable automatic backend deployment, set provider secrets (Railway/Render) and add provider-specific deploy steps here."
